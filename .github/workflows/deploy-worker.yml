name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker.js'
      - 'worker-agents.js'
      - 'rate-benchmarks.js'
      - 'package.json'
      - 'package-lock.json'
      - 'wrangler.toml'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Deploy Worker
        run: npx --yes wrangler@latest deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
