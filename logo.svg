<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 130" shape-rendering="crispEdges">
  <defs>
    <linearGradient id="cc-rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="18%" stop-color="#6366F1"/>
      <stop offset="35%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#10B981"/>
      <stop offset="65%" stop-color="#EAB308"/>
      <stop offset="82%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>
  <g fill="url(#cc-rainbow)">
    <!-- antennae -->
    <rect x="40" y="0" width="10" height="20"/>
    <rect x="90" y="0" width="10" height="20"/>
    <!-- top of head -->
    <rect x="30" y="20" width="10" height="10"/>
    <rect x="50" y="20" width="10" height="10"/>
    <rect x="80" y="20" width="10" height="10"/>
    <rect x="100" y="20" width="10" height="10"/>
    <!-- head -->
    <rect x="20" y="30" width="100" height="10"/>
    <!-- face row with eye sockets -->
    <rect x="10" y="40" width="30" height="10"/>
    <rect x="60" y="40" width="20" height="10"/>
    <rect x="100" y="40" width="30" height="10"/>
    <!-- widest body -->
    <rect x="0" y="50" width="140" height="10"/>
    <rect x="0" y="60" width="140" height="10"/>
    <!-- arms and upper legs -->
    <rect x="0" y="70" width="20" height="10"/>
    <rect x="30" y="70" width="80" height="10"/>
    <rect x="120" y="70" width="20" height="10"/>
    <!-- split legs -->
    <rect x="0" y="80" width="10" height="10"/>
    <rect x="20" y="80" width="10" height="10"/>
    <rect x="40" y="80" width="60" height="10"/>
    <rect x="110" y="80" width="10" height="10"/>
    <rect x="130" y="80" width="10" height="10"/>
    <!-- lower legs -->
    <rect x="30" y="90" width="10" height="10"/>
    <rect x="50" y="90" width="40" height="10"/>
    <rect x="100" y="90" width="10" height="10"/>
    <!-- claw -->
    <rect x="50" y="100" width="10" height="10"/>
    <rect x="70" y="100" width="10" height="20"/>
    <rect x="80" y="100" width="10" height="10"/>
    <rect x="60" y="110" width="10" height="10"/>
    <rect x="90" y="110" width="10" height="10"/>
  </g>
</svg>
